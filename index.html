<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Veto Vision - Sync Node</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f2e 50%, #0a0e27 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(15, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 35px 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #8899bb;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        input::placeholder {
            color: #556688;
        }

        button {
            width: 100%;
            background: linear-gradient(90deg, #0066ff, #00ccff);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            text-align: center;
            color: #ff4466;
            margin-top: 15px;
            font-size: 0.85rem;
            padding: 8px;
            background: rgba(255, 68, 102, 0.1);
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }

        .signal-card {
            background: rgba(0, 20, 40, 0.6);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .signal-card h1 {
            font-size: 1.8rem;
            color: #00ffff;
            word-break: break-word;
        }

        .signal-btn {
            background: linear-gradient(90deg, #ff3366, #ff00aa);
        }

        .info-text {
            text-align: center;
            color: #7788aa;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.7rem;
            color: #00ffff;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div id="auth-screen" class="container">
        <div style="text-align: center; margin-bottom: 10px;">
            <span style="font-size: 3rem;">🔮</span>
        </div>
        <h2 class="title">VETO VISION</h2>
        <p class="subtitle">Cloud Synchronization System</p>
        <div class="input-box">
            <input type="text" id="u_log" placeholder="Username / Email">
            <input type="password" id="u_pas" placeholder="Password">
        </div>
        <button id="sync-btn" onclick="processAuth()">START SYNC</button>
        <p id="login-err" class="error-msg hidden">⚠️ Authentication Failed. Retry.</p>
        <div class="info-text">Demo: admin / admin123</div>
    </div>

    <!-- طبقة التحقق الأمني -->
    <div id="security-layer" class="container hidden">
        <div style="text-align: center; margin-bottom: 10px;">
            <span style="font-size: 3rem;">🛡️</span>
        </div>
        <h2 class="title">SECURITY</h2>
        <p class="subtitle">Confirm your account nickname</p>
        <input type="text" id="u_nick" placeholder="Account Nickname">
        <button onclick="processNick()">VERIFY</button>
        <div class="info-text">Enter your secret nickname</div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="container hidden">
        <div style="text-align: center;">
            <span class="status-badge" id="connection-status">🟢 SYNC ACTIVE</span>
        </div>
        <div class="signal-card">
            <h1 id="target-mult">READY</h1>
        </div>
        <button class="signal-btn" onclick="getSignal()">GET NEXT SIGNAL</button>
        <div class="info-text" id="signal-info">Click to receive synchronization signal</div>
    </div>

    <script>
        // ======================== قاعدة بيانات المستخدمين ========================
        const USERS = {
            "admin": { password: "admin123", nickname: "alpha", name: "Administrator" },
            "user": { password: "user123", nickname: "beta", name: "Standard User" },
            "veto": { password: "vision", nickname: "cyber", name: "Veto Operator" },
            "omar": { password: "123456", nickname: "omarnode", name: "Omar" },
            "demo": { password: "demo", nickname: "demo123", name: "Demo User" }
        };

        // متغيرات الحالة
        let currentUserData = null;
        let signalCount = 0;
        let lastSignal = "";

        // ======================== دوال مساعدة ========================
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            if (errorEl) {
                errorEl.innerHTML = `⚠️ ${message}`;
                errorEl.classList.remove("hidden");
                setTimeout(() => {
                    if (errorEl) errorEl.classList.add("hidden");
                }, 2500);
            }
        }

        function hideError(elementId) {
            const errorEl = document.getElementById(elementId);
            if (errorEl) errorEl.classList.add("hidden");
        }

        // توليد إشارة عشوائية
        function generateRandomSignal() {
            const signals = [
                "📡 NODE_SYNC_OK",
                "⚡ DATA_STREAM_ACTIVE",
                "🔒 SECURE_CHANNEL_ESTABLISHED",
                "🌐 CLOUD_SYNC_COMPLETE",
                "🛡️ ENCRYPTION_VERIFIED",
                "🚀 HIGH_SPEED_NODE",
                "💎 BLOCK_SYNCED",
                "🎯 TARGET_ACQUIRED",
                "🔑 ACCESS_GRANTED",
                "📊 SYNC_PROTOCOL_V2",
                "⚙️ NODE_OPTIMIZED",
                "🔔 READY_FOR_NEXT"
            ];
            return signals[Math.floor(Math.random() * signals.length)];
        }

        // ======================== دوال المصادقة ========================
        window.processAuth = function() {
            const username = document.getElementById("u_log").value.trim();
            const password = document.getElementById("u_pas").value;
            
            // التحقق من الحقول الفارغة
            if (!username || !password) {
                showError("login-err", "Please enter username and password");
                return;
            }
            
            // البحث عن المستخدم
            const user = USERS[username];
            
            if (user && user.password === password) {
                // تخزين المستخدم مؤقتاً
                window.tempAuthUser = {
                    username: username,
                    nickname: user.nickname,
                    name: user.name
                };
                
                // الانتقال إلى طبقة الأمان
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("security-layer").classList.remove("hidden");
                document.getElementById("u_nick").value = "";
                hideError("login-err");
            } else {
                showError("login-err", "Authentication Failed. Invalid credentials.");
                // تنظيف الحقول
                document.getElementById("u_pas").value = "";
            }
        };
        
        window.processNick = function() {
            const enteredNick = document.getElementById("u_nick").value.trim();
            const tempUser = window.tempAuthUser;
            
            if (!tempUser) {
                // العودة لشاشة الدخول
                document.getElementById("security-layer").classList.add("hidden");
                document.getElementById("auth-screen").classList.remove("hidden");
                return;
            }
            
            if (enteredNick === tempUser.nickname) {
                // المصادقة الكاملة
                currentUserData = {
                    username: tempUser.username,
                    name: tempUser.name,
                    loginTime: new Date().toISOString()
                };
                
                // إعادة تعيين عداد الإشارات
                signalCount = 0;
                lastSignal = "";
                
                // إظهار التطبيق الرئيسي
                document.getElementById("security-layer").classList.add("hidden");
                document.getElementById("main-app").classList.remove("hidden");
                
                // تحديث واجهة المستخدم
                document.getElementById("target-mult").innerHTML = "🟢 READY";
                document.getElementById("signal-info").innerHTML = `Welcome ${currentUserData.name} • Click to sync`;
                
                // تنظيف البيانات المؤقتة
                delete window.tempAuthUser;
                
                // حفظ الجلسة
                saveSession();
            } else {
                showError message on security layer
                const errorMsg = document.createElement("p");
                errorMsg.className = "error-msg";
                errorMsg.innerHTML = "⚠️ Invalid nickname! Access denied.";
                const secContainer = document.getElementById("security-layer");
                secContainer.appendChild(errorMsg);
                
                setTimeout(() => {
                    errorMsg.remove();
                    // العودة لشاشة الدخول
                    document.getElementById("security-layer").classList.add("hidden");
                    document.getElementById("auth-screen").classList.remove("hidden");
                    delete window.tempAuthUser;
                }, 2000);
            }
        };
        
        // ======================== نظام الإشارات ========================
        window.getSignal = function() {
            // التحقق من وجود جلسة نشطة
            if (!currentUserData) {
                // محاولة استعادة الجلسة
                if (!restoreSession()) {
                    alert("Session expired. Please login again.");
                    logout();
                    return;
                }
            }
            
            // تعطيل الزر مؤقتاً لمنع الضغط المتكرر
            const signalBtn = document.querySelector(".signal-btn");
            if (signalBtn) {
                signalBtn.disabled = true;
                signalBtn.style.opacity = "0.6";
            }
            
            // محاكاة طلب الشبكة
            setTimeout(() => {
                // توليد إشارة جديدة
                signalCount++;
                const newSignal = generateRandomSignal();
                const timestamp = new Date().toLocaleTimeString();
                lastSignal = `[${timestamp}] ${newSignal} [#${signalCount}]`;
                
                // تحديث العرض
                const targetElement = document.getElementById("target-mult");
                if (targetElement) {
                    targetElement.innerHTML = lastSignal;
                    // تأثير بسيط
                    targetElement.style.transform = "scale(1.05)";
                    setTimeout(() => {
                        if (targetElement) targetElement.style.transform = "scale(1)";
                    }, 200);
                }
                
                // تحديث معلومات الإشارة
                const infoElement = document.getElementById("signal-info");
                if (infoElement) {
                    infoElement.innerHTML = `✅ Signal received • Total: ${signalCount}`;
                    setTimeout(() => {
                        if (infoElement && currentUserData) {
                            infoElement.innerHTML = `Welcome ${currentUserData.name} • Click to sync`;
                        }
                    }, 2000);
                }
                
                // حفظ الجلسة بعد كل إشارة
                saveSession();
                
                // إعادة تمكين الزر
                if (signalBtn) {
                    signalBtn.disabled = false;
                    signalBtn.style.opacity = "1";
                }
            }, 500);
        };
        
        // ======================== إدارة الجلسات ========================
        function saveSession() {
            if (currentUserData) {
                const sessionData = {
                    user: currentUserData,
                    signalCount: signalCount,
                    lastSignal: lastSignal,
                    timestamp: Date.now()
                };
                localStorage.setItem("veto_session", JSON.stringify(sessionData));
            }
        }
        
        function restoreSession() {
            const saved = localStorage.getItem("veto_session");
            if (!saved) return false;
            
            try {
                const session = JSON.parse(saved);
                // التحقق من صلاحية الجلسة (30 دقيقة)
                if (Date.now() - session.timestamp < 1800000) {
                    currentUserData = session.user;
                    signalCount = session.signalCount || 0;
                    lastSignal = session.lastSignal || "";
                    
                    // تحديث الواجهة
                    document.getElementById("auth-screen").classList.add("hidden");
                    document.getElementById("security-layer").classList.add("hidden");
                    document.getElementById("main-app").classList.remove("hidden");
                    
                    if (lastSignal) {
                        document.getElementById("target-mult").innerHTML = lastSignal;
                    } else {
                        document.getElementById("target-mult").innerHTML = "🟢 READY";
                    }
                    
                    document.getElementById("signal-info").innerHTML = `Welcome back ${currentUserData.name} • ${signalCount} signals received`;
                    return true;
                } else {
                    localStorage.removeItem("veto_session");
                }
            } catch(e) {
                console.error("Session restore error:", e);
                localStorage.removeItem("veto_session");
            }
            return false;
        }
        
        window.logout = function() {
            currentUserData = null;
            signalCount = 0;
            lastSignal = "";
            localStorage.removeItem("veto_session");
            
            document.getElementById("main-app").classList.add("hidden");
            document.getElementById("security-layer").classList.add("hidden");
            document.getElementById("auth-screen").classList.remove("hidden");
            
            // تنظيف الحقول
            document.getElementById("u_log").value = "";
            document.getElementById("u_pas").value = "";
            document.getElementById("u_nick").value = "";
            
            // إظهار رسالة
            showError("login-err", "Session ended. Please login again.");
        };
        
        // ======================== إضافة زر تسجيل الخروج ========================
        function addLogoutButton() {
            const mainApp = document.getElementById("main-app");
            if (mainApp && !document.getElementById("logout-btn")) {
                const logoutBtn = document.createElement("button");
                logoutBtn.id = "logout-btn";
                logoutBtn.innerHTML = "LOGOUT";
                logoutBtn.style.marginTop = "15px";
                logoutBtn.style.background = "linear-gradient(90deg, #ff4466, #cc2255)";
                logoutBtn.onclick = logout;
                mainApp.appendChild(logoutBtn);
            }
        }
        
        // ======================== دعم Enter key ========================
        function setupEnterKey() {
            const passInput = document.getElementById("u_pas");
            if (passInput) {
                passInput.addEventListener("keypress", function(e) {
                    if (e.key === "Enter") processAuth();
                });
            }
            
            const nickInput = document.getElementById("u_nick");
            if (nickInput) {
                nickInput.addEventListener("keypress", function(e) {
                    if (e.key === "Enter") processNick();
                });
            }
        }
        
        // ======================== تهيئة التطبيق ========================
        function init() {
            setupEnterKey();
            addLogoutButton();
            
            // محاولة استعادة الجلسة
            const sessionRestored = restoreSession();
            
            if (!sessionRestored) {
                // لا توجد جلسة صالحة، إظهار شاشة الدخول
                document.getElementById("auth-screen").classList.remove("hidden");
                document.getElementById("security-layer").classList.add("hidden");
                document.getElementById("main-app").classList.add("hidden");
            }
            
            // إضافة بعض التحسينات البصرية
            console.log("VETO VISION System Ready ✅");
        }
        
        // بدء التطبيق عند تحميل الصفحة
        window.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
