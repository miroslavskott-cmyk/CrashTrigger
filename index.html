<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Predictor v6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/Awesome/6.0.0/css/all.min.css">
    
    <style>
        .hidden { display: none !important; }
        
        /* أنيميشن النبض الفيروزي */
        @keyframes radar-pulse {
            0% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); }
            70% { transform: scale(1.1); opacity: 0.3; box-shadow: 0 0 0 30px rgba(0, 255, 255, 0); }
            100% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
        }

        .pulse-circle {
            animation: radar-pulse 2s infinite;
        }

        /* ستايل خانة اللقب لضمان الظهور */
        #sec_ans {
            display: block !important;
            width: 90% !important;
            height: 60px !important;
            background-color: #ffffff !important;
            border: 4px solid #ff0000 !important;
            border-radius: 12px !important;
            color: #000000 !important;
            font-size: 20px !important;
            font-weight: bold !important;
            text-align: center !important;
            margin: 20px auto !important;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">

    <section id="auth-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-black">
        <h1 class="text-3xl font-black italic mb-6">QUANTUM<span class="text-blue-600">NODE</span></h1>
        <div class="w-full max-w-sm space-y-4 text-center">
            <input type="text" id="u_log" placeholder="رقم الهاتف أو البريد" class="w-full p-4 bg-zinc-900 rounded-xl text-center border border-white/10 outline-none">
            <input type="password" id="u_pas" placeholder="كلمة المرور" class="w-full p-4 bg-zinc-900 rounded-xl text-center border border-white/10 outline-none">
            <button onclick="processAuth()" id="sync-btn" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase transition-transform active:scale-95">Start Sync</button>
            <p id="status-text" class="text-xs text-zinc-500 mt-4"></p>
        </div>
    </section>

    <section id="security-layer" style="position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px;">
        <div style="text-align: center; width: 100%; max-width: 350px;">
            <div style="width: 70px; height: 70px; background: rgba(255,0,0,0.1); border: 2px solid #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <span style="color: #ff0000; font-size: 30px;">⚠️</span>
            </div>
            <h2 style="font-size: 22px; font-weight: 900; color: white; margin-bottom: 5px;">SECURITY LOCK</h2>
            <p style="color: #ff0000; font-size: 12px; font-weight: bold; margin-bottom: 20px;">أدخل اللقب أو الإجابة السرية لتأكيد هويتك</p>
            <input type="text" id="sec_ans" placeholder="اكتب الإجابة هنا...">
            <button onclick="finalVerify()" id="sec-btn" style="width: 100%; background: white; color: black; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase;">Confirm & Unlock</button>
        </div>
    </section>

    <section id="main-app" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center">
        <div class="relative flex flex-col items-center">
            <div class="pulse-circle absolute w-64 h-64 border-2 border-cyan-500 rounded-full opacity-20"></div>
            
            <div id="target-mult" class="relative text-7xl font-black text-white drop-shadow-[0_0_15px_rgba(0,255,255,0.8)] italic">1.00x</div>
            <p class="text-cyan-400 font-bold mt-6 tracking-widest text-xs uppercase">Quantum Signal Active</p>
            
            <button onclick="getSignal()" class="mt-16 px-14 py-4 bg-cyan-500 text-black font-black rounded-full shadow-[0_0_20px_rgba(0,255,255,0.4)] transition-all active:scale-90 uppercase italic">
                Get Signal
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
