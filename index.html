<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veto Vision Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:white; font-family:Arial; overflow:hidden; }
.hidden { display:none !important; }

.signal-circle {
    width:280px;height:280px;
    border:8px solid #fff;
    border-radius:50%;
    background: radial-gradient(circle,#1e69ff,#0044cc);
    box-shadow:0 0 50px rgba(30,105,255,.6);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
}

.pulse-border {
    position:absolute;width:320px;height:320px;
    border:1px solid rgba(30,105,255,.3);
    border-radius:50%;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% {transform:scale(.9);opacity:1;}
    100% {transform:scale(1.2);opacity:0;}
}

.vip-card {
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<section id="auth-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-black p-6">
<h1 class="text-3xl font-black italic mb-8">QUANTUM<span class="text-blue-500">NODE</span></h1>

<div class="w-full max-w-xs space-y-4">
<input id="u_log" placeholder="رقم الهاتف أو البريد" class="w-full p-4 bg-zinc-900 rounded-xl text-center">
<input id="u_pas" type="password" placeholder="كلمة المرور" class="w-full p-4 bg-zinc-900 rounded-xl text-center">
<button onclick="processAuth()" class="w-full py-4 bg-blue-600 rounded-xl font-bold">Start</button>
</div>
</section>

<!-- SECURITY -->
<section id="security-layer" class="hidden fixed inset-0 flex flex-col items-center justify-center bg-black p-6">
<h2 class="text-xl mb-4">تأكيد الهوية</h2>
<input id="sec_ans" placeholder="الجواب السري" class="p-4 text-black rounded">
<button onclick="finalVerify()" class="mt-4 bg-white text-black px-6 py-2 rounded">تأكيد</button>
</section>

<!-- APP -->
<section id="main-app" class="hidden fixed inset-0 flex flex-col items-center">

<div class="flex-1 flex flex-col items-center justify-center relative">
<div class="pulse-border"></div>

<div class="signal-circle">
<div id="target-mult" class="text-5xl font-bold">1.00x</div>
<div class="text-xs mt-2">NEXT HIT</div>
</div>
</div>

<button onclick="getSignal()" class="mb-10 bg-cyan-500 text-black px-8 py-4 rounded-xl font-bold">
Get Signal
</button>

</section>

<script>
// بيانات بسيطة (محاكاة فقط)
const USER = {
    login: "admin",
    pass: "1234",
    secret: "veto"
};

// تسجيل الدخول
function processAuth(){
    let u = document.getElementById("u_log").value.trim();
    let p = document.getElementById("u_pas").value.trim();

    if(!u || !p){
        alert("املأ جميع الحقول");
        return;
    }

    if(u === USER.login && p === USER.pass){
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("security-layer").classList.remove("hidden");
    } else {
        alert("بيانات خاطئة");
    }
}

// التحقق النهائي
function finalVerify(){
    let ans = document.getElementById("sec_ans").value.trim();

    if(ans.toLowerCase() === USER.secret){
        document.getElementById("security-layer").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
    } else {
        alert("إجابة خاطئة");
    }
}

// توليد إشارة
function getSignal(){
    let el = document.getElementById("target-mult");

    let value = (Math.random() * 5 + 1).toFixed(2);

    el.innerText = value + "x";

    // تأثير
    el.style.transform = "scale(1.3)";
    setTimeout(()=>{
        el.style.transform = "scale(1)";
    },300);
}
</script>

</body>
</html>
