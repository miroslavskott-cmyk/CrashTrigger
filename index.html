<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Predictor v6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* أنيميشن النبض الفيروزي الإجباري */
        @keyframes radar-pulse-forced {
            0% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7) !important; }
            70% { transform: scale(1.1); opacity: 0.3; box-shadow: 0 0 0 30px rgba(0, 255, 255, 0) !important; }
            100% { transform: scale(0.9); opacity: 0.8; box-shadow: 0 0 0 0 rgba(0, 255, 255, 0) !important; }
        }

        .pulse-circle-forced {
            animation: radar-pulse-forced 2s infinite !important;
        }

        .hidden { display: none !important; }

        /* ستايل خانة اللقب لضمان الظهور بالسيف */
        #sec_ans {
            display: block !important;
            width: 90% !important;
            height: 60px !important;
            background-color: #ffffff !important;
            border: 4px solid #ff0000 !important;
            border-radius: 12px !important;
            color: #000000 !important;
            font-size: 20px !important;
            font-weight: bold !important;
            text-align: center !important;
            margin: 20px auto !important;
        }
    </style>
</head>
<body style="background-color: #000 !important; color: #fff !important; overflow: hidden !important;">

    <section id="auth-screen" style="position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background-color: #000;">
        <h1 style="font-size: 30px; font-weight: 900; font-style: italic; margin-bottom: 24px;">QUANTUM<span style="color: #2563eb;">NODE</span></h1>
        <div style="width: 100%; max-width: 350px; text-align: center;">
            <input type="text" id="u_log" placeholder="رقم الهاتف أو البريد" style="width: 100%; padding: 16px; background: #1a1a1a; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 12px; color: #fff; outline: none;">
            <input type="password" id="u_pas" placeholder="كلمة المرور" style="width: 100%; padding: 16px; background: #1a1a1a; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 12px; color: #fff; outline: none;">
            <button onclick="processAuth()" id="sync-btn" style="width: 100%; padding: 16px; background-color: #2563eb; color: #fff; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; transition: transform 0.1s;">Start Sync</button>
            <p id="status-text" style="font-size: 11px; color: #555; margin-top: 16px;"></p>
        </div>
    </section>

    <section id="security-layer" style="position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px;">
        <div style="text-align: center; width: 100%; max-width: 350px;">
            <div style="width: 70px; height: 70px; background: rgba(255,0,0,0.1); border: 2px solid #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <span style="color: #ff0000; font-size: 30px;">⚠️</span>
            </div>
            <h2 style="font-size: 22px; font-weight: 900; color: white; margin-bottom: 5px;">SECURITY LOCK</h2>
            <p style="color: #ff0000; font-size: 12px; font-weight: bold; margin-bottom: 20px;">أدخل اللقب أو الإجابة السرية لتأكيد هويتك</p>
            <input type="text" id="sec_ans" placeholder="اكتب الإجابة هنا...">
            <button onclick="finalVerify()" id="sec-btn" style="width: 100%; background: white; color: black; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase;">Confirm & Unlock</button>
        </div>
    </section>

    <section id="main-app" class="hidden" style="position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column; align-items: center; justify-content: center; background-color: #000 !important;">
        <div style="position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            
            <div class="pulse-circle-forced" style="position: absolute; width: 250px; height: 250px; border: 3px solid #00ffff !important; background: rgba(0,255,255,0.05) !important; rounded-radius: 50% !important; border-radius: 50% !important;"></div>
            
            <div id="target-mult" style="position: relative; font-size: 70px !important; font-weight: 900 !important; font-style: italic !important; color: #ffffff !important; text-shadow: 0 0 25px #00ffff !important; margin-bottom: 10px !important;">1.00x</div>
            
            <p style="color: #00ffff !important; font-weight: bold !important; margin-top: 10px !important; tracking-widest: text-xs uppercase; font-size: 12px !important; text-transform: uppercase !important; text-shadow: 0 0 10px #00ffff !important;">Quantum Signal Active</p>
            
            <button onclick="getSignal()" 
                style="margin-top: 60px !important; padding: 18px 60px !important; background-color: #00ffff !important; color: #000000 !important; font-weight: 900 !important; border-radius: 50px !important; border: none !important; text-transform: uppercase !important; font-style: italic !important; box-shadow: 0 0 25px rgba(0,255,255,0.5) !important; transition: transform 0.1s !important;">
                Get New Signal
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
