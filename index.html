<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VETO VISION | نظام المزامنة المتقدم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 50%, #0b0e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(0, 255, 255, 0.2);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #8ba0c0;
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input {
            background: rgba(0, 10, 25, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 16px;
            padding: 14px 20px;
            color: #e0e8ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            background: rgba(0, 20, 40, 0.9);
        }

        input::placeholder {
            color: #5a6e8a;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #00aaff, #0066ff);
            border: none;
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 102, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            text-align: center;
            color: #ff4466;
            margin-top: 15px;
            font-size: 0.85rem;
            padding: 8px;
            background: rgba(255, 68, 102, 0.1);
            border-radius: 12px;
            border-right: 3px solid #ff4466;
        }

        .hidden {
            display: none;
        }

        .signal-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.05));
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .signal-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            word-break: break-word;
        }

        .signal-btn {
            background: linear-gradient(135deg, #ff3366, #ff00aa);
        }

        /* لوحة تحكم متقدمة */
        .dashboard-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(0, 20, 40, 0.6);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8ba0c0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00ffff;
            margin-top: 5px;
        }

        .logout-btn {
            background: rgba(255, 68, 102, 0.2);
            border: 1px solid #ff4466;
            color: #ff6688;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: #ff4466;
            color: white;
            box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
        }

        .signal-history {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 15px;
        }

        .history-title {
            font-size: 0.8rem;
            color: #6a7c9e;
            text-align: center;
            margin-bottom: 10px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #b0c4ff;
            font-family: monospace;
            border-right: 2px solid #00ffff;
        }

        .loading {
            position: relative;
            opacity: 0.7;
            pointer-events: none;
        }

        .loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        i {
            margin-left: 8px;
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px 20px;
            }
            .title {
                font-size: 1.8rem;
            }
            .signal-card h1 {
                font-size: 1.5rem;
            }
        }

        /* سكرول مخصص */
        .signal-history::-webkit-scrollbar {
            width: 5px;
        }
        .signal-history::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .signal-history::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="auth-screen" class="container">
    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; display: block; text-align: center; color: #00ffff; margin-bottom: 10px;"></i>
    <h2 class="title">VETO VISION</h2>
    <p class="subtitle">نظام المزامنة السحابي المتقدم</p>
    <div class="input-box">
        <input type="text" id="u_log" placeholder="اسم المستخدم / البريد الإلكتروني" autocomplete="off">
        <input type="password" id="u_pas" placeholder="كلمة المرور">
    </div>
    <button id="sync-btn" onclick="processAuth()">
        <i class="fas fa-sync-alt"></i> بدء المزامنة
    </button>
    <p id="login-err" class="error-msg hidden">⚠️ فشل المصادقة. يرجى المحاولة مرة أخرى.</p>
</div>

<div id="security-layer" class="container hidden">
    <i class="fas fa-shield-alt" style="font-size: 2.5rem; display: block; text-align: center; color: #ff00ff; margin-bottom: 10px;"></i>
    <h2 class="title">التحقق الأمني</h2>
    <p class="subtitle">تأكيد اللقب الخاص بحسابك</p>
    <input type="text" id="u_nick" placeholder="لقب الحساب" autocomplete="off">
    <button onclick="processNick()"><i class="fas fa-check-circle"></i> تحقق</button>
</div>

<div id="main-app" class="container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <i class="fas fa-chart-line" style="color: #00ffff; font-size: 1.5rem;"></i>
        <span id="user-welcome" style="color: #00ffff; font-weight: 600;"></span>
        <i class="fas fa-bolt" style="color: #ff00ff; font-size: 1.5rem;"></i>
    </div>
    
    <div class="dashboard-stats">
        <div class="stat-card">
            <div class="stat-label"><i class="fas fa-signal"></i> الإشارات المستلمة</div>
            <div class="stat-value" id="signal-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><i class="fas fa-clock"></i> آخر تحديث</div>
            <div class="stat-value" id="last-update" style="font-size: 0.9rem;">--:--:--</div>
        </div>
    </div>
    
    <div class="signal-card">
        <h1 id="target-mult">جاهز</h1>
    </div>
    
    <button class="signal-btn" onclick="getSignal()">
        <i class="fas fa-arrow-down"></i> الحصول على الإشارة التالية
    </button>
    
    <div class="signal-history">
        <div class="history-title"><i class="fas fa-history"></i> سجل الإشارات</div>
        <div id="history-list"></div>
    </div>
    
    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> إنهاء الجلسة
    </button>
</div>

<script>
    // ======================== نظام المصادقة المتقدم ========================
    // قاعدة بيانات المستخدمين المشفرة محلياً (محاكاة لقاعدة بيانات آمنة)
    const USER_DB = [
        { username: "admin", password: "admin123", nickname: "alpha", displayName: "Admin" },
        { username: "user", password: "user123", nickname: "beta", displayName: "User" },
        { username: "veto", password: "vision2024", nickname: "cyber", displayName: "Veto" },
        { username: "omar@veto.com", password: "sync123", nickname: "omarx", displayName: "Omar" },
        { username: "demo", password: "demo", nickname: "demo_user", displayName: "Demo" }
    ];

    let currentUser = null;
    let signalHistory = [];
    let signalCounter = 0;

    // توليد إشارات عشوائية متطورة
    const generateSignal = () => {
        const signals = [
            "📡 SYNC_ACTIVE", "⚡ VETO_NODE_ONLINE", "🔒 ENCRYPTED_CHANNEL", 
            "🌐 CLOUD_SYNC_OK", "🛡️ SECURITY_LAYER_VERIFIED", "🚀 HIGH_FREQUENCY",
            "💎 BLOCK_CONFIRMED", "🎯 TARGET_LOCKED", "🔑 ACCESS_GRANTED",
            "📊 DATA_STREAM_ACTIVE", "⚙️ NODE_OPTIMIZED", "🔔 READY_FOR_SYNC"
        ];
        const randomSignal = signals[Math.floor(Math.random() * signals.length)];
        const timestamp = new Date().toLocaleTimeString('ar-EG');
        return `[${timestamp}] ${randomSignal} #${signalCounter + 1}`;
    };

    // إضافة إشارة إلى السجل
    const addToHistory = (signal) => {
        signalHistory.unshift(signal);
        if (signalHistory.length > 10) signalHistory.pop();
        updateHistoryDisplay();
    };

    const updateHistoryDisplay = () => {
        const historyDiv = document.getElementById('history-list');
        if (!historyDiv) return;
        if (signalHistory.length === 0) {
            historyDiv.innerHTML = '<div style="text-align:center; color:#6a7c9e;">لا توجد إشارات بعد</div>';
            return;
        }
        historyDiv.innerHTML = signalHistory.map(sig => `<div class="history-item"><i class="fas fa-waveform"></i> ${sig}</div>`).join('');
    };

    const updateStats = () => {
        const countSpan = document.getElementById('signal-count');
        if (countSpan) countSpan.innerText = signalCounter;
        const lastUpdateSpan = document.getElementById('last-update');
        if (lastUpdateSpan) {
            const now = new Date();
            lastUpdateSpan.innerText = now.toLocaleTimeString('ar-EG');
        }
    };

    // الحصول على إشارة جديدة
    window.getSignal = function() {
        if (!currentUser) {
            alert("الرجاء تسجيل الدخول أولاً");
            logout();
            return;
        }
        
        const btn = document.querySelector('.signal-btn');
        btn.classList.add('loading');
        btn.disabled = true;
        
        // محاكاة طلب الشبكة
        setTimeout(() => {
            const newSignal = generateSignal();
            signalCounter++;
            document.getElementById('target-mult').innerHTML = newSignal;
            addToHistory(newSignal);
            updateStats();
            
            // تأثير اهتزاز خفيف للإشارة
            const card = document.querySelector('.signal-card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = 'scale(1)'; }, 200);
            
            btn.classList.remove('loading');
            btn.disabled = false;
            
            // حفظ الجلسة
            saveSession();
        }, 400);
    };

    // حفظ الجلسة في localStorage
    const saveSession = () => {
        if (currentUser) {
            const sessionData = {
                user: currentUser,
                history: signalHistory,
                counter: signalCounter,
                timestamp: Date.now()
            };
            localStorage.setItem('veto_session', JSON.stringify(sessionData));
        }
    };

    // استعادة الجلسة
    const restoreSession = () => {
        const saved = localStorage.getItem('veto_session');
        if (saved) {
            try {
                const session = JSON.parse(saved);
                // التحقق من صلاحية الجلسة (ساعة واحدة)
                if (Date.now() - session.timestamp < 3600000) {
                    currentUser = session.user;
                    signalHistory = session.history || [];
                    signalCounter = session.counter || 0;
                    return true;
                } else {
                    localStorage.removeItem('veto_session');
                }
            } catch(e) {}
        }
        return false;
    };

    // تسجيل الخروج
    window.logout = function() {
        currentUser = null;
        signalHistory = [];
        signalCounter = 0;
        localStorage.removeItem('veto_session');
        
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('security-layer').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
        
        // تنظيف الحقول
        document.getElementById('u_log').value = '';
        document.getElementById('u_pas').value = '';
        document.getElementById('u_nick').value = '';
        
        // إظهار رسالة ترحيب بالخروج
        const errDiv = document.getElementById('login-err');
        errDiv.classList.remove('hidden');
        errDiv.innerHTML = '<i class="fas fa-power-off"></i> تم تسجيل الخروج بنجاح';
        setTimeout(() => {
            if (errDiv && errDiv.classList.contains('hidden') === false) {
                errDiv.classList.add('hidden');
            }
        }, 2000);
    };

    // معالجة المصادقة
    window.processAuth = function() {
        const username = document.getElementById('u_log').value.trim();
        const password = document.getElementById('u_pas').value;
        const errDiv = document.getElementById('login-err');
        
        if (!username || !password) {
            errDiv.classList.remove('hidden');
            errDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> الرجاء إدخال اسم المستخدم وكلمة المرور';
            return;
        }
        
        const user = USER_DB.find(u => u.username === username && u.password === password);
        
        if (user) {
            // تخزين المستخدم مؤقتاً للخطوة الثانية
            window.tempUser = user;
            errDiv.classList.add('hidden');
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('security-layer').classList.remove('hidden');
            // إضافة تأثير
            document.getElementById('u_nick').value = '';
        } else {
            errDiv.classList.remove('hidden');
            errDiv.innerHTML = '<i class="fas fa-lock"></i> ⚠️ فشل المصادقة. اسم المستخدم أو كلمة المرور غير صحيحة';
            // تأثير هز للحقل
            const inputs = document.querySelectorAll('#auth-screen input');
            inputs.forEach(inp => {
                inp.style.transform = 'shake 0.3s';
                setTimeout(() => { inp.style.transform = ''; }, 300);
            });
        }
    };

    // التحقق من اللقب
    window.processNick = function() {
        const nickname = document.getElementById('u_nick').value.trim();
        const tempUser = window.tempUser;
        const securityContainer = document.getElementById('security-layer');
        const authContainer = document.getElementById('auth-screen');
        
        if (!tempUser) {
            // العودة لشاشة الدخول
            securityContainer.classList.add('hidden');
            authContainer.classList.remove('hidden');
            return;
        }
        
        if (nickname === tempUser.nickname) {
            // نجاح التحقق الأمني
            currentUser = {
                ...tempUser,
                loginTime: Date.now()
            };
            
            // تهيئة البيانات
            signalHistory = [];
            signalCounter = 0;
            
            // عرض لوحة التحكم
            securityContainer.classList.add('hidden');
            const mainApp = document.getElementById('main-app');
            mainApp.classList.remove('hidden');
            
            // تحديث ترحيب المستخدم
            const welcomeSpan = document.getElementById('user-welcome');
            if (welcomeSpan) {
                welcomeSpan.innerHTML = `<i class="fas fa-user-astronaut"></i> مرحباً ${tempUser.displayName}`;
            }
            
            // تحديث الإحصائيات والسجل
            updateStats();
            updateHistoryDisplay();
            document.getElementById('target-mult').innerHTML = '🟢 جاهز للمزامنة';
            
            // حفظ الجلسة
            saveSession();
            
            // إضافة إشارة ترحيبية
            setTimeout(() => {
                addToHistory(`[${new Date().toLocaleTimeString('ar-EG')}] ✅ تم تسجيل الدخول بنجاح - ${tempUser.displayName}`);
            }, 500);
            
            // تنظيف البيانات المؤقتة
            delete window.tempUser;
        } else {
            // فشل التحقق
            const errMsg = document.createElement('p');
            errMsg.className = 'error-msg';
            errMsg.innerHTML = '<i class="fas fa-skull-crossbones"></i> اللقب غير صحيح! تم إلغاء الوصول.';
            securityContainer.appendChild(errMsg);
            setTimeout(() => {
                errMsg.remove();
                // العودة لشاشة الدخول
                securityContainer.classList.add('hidden');
                authContainer.classList.remove('hidden');
                delete window.tempUser;
            }, 2000);
        }
    };

    // التحقق من وجود جلسة محفوظة عند تحميل الصفحة
    const initApp = () => {
        if (restoreSession()) {
            // جلسة موجودة وصالحة
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('security-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            const welcomeSpan = document.getElementById('user-welcome');
            if (welcomeSpan && currentUser) {
                welcomeSpan.innerHTML = `<i class="fas fa-user-astronaut"></i> مرحباً ${currentUser.displayName}`;
            }
            updateStats();
            updateHistoryDisplay();
            if (signalHistory.length > 0 && document.getElementById('target-mult')) {
                document.getElementById('target-mult').innerHTML = signalHistory[0] || '🟢 جلسة مستعادة';
            } else {
                document.getElementById('target-mult').innerHTML = '🟢 مرحباً بعودتك';
            }
        } else {
            // لا جلسة، شاشة الدخول
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('security-layer').classList.add('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
        
        // إضافة خاصية الضغط على Enter
        const passInput = document.getElementById('u_pas');
        if (passInput) {
            passInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') processAuth();
            });
        }
        const nickInput = document.getElementById('u_nick');
        if (nickInput) {
            nickInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') processNick();
            });
        }
    };

    // تأثيرات إضافية: مؤشر كتابة
    const addEffects = () => {
        // تأثير نبض للعنوان
        const title = document.querySelector('.title');
        if (title) {
            setInterval(() => {
                title.style.textShadow = '0 0 10px rgba(0,255,255,0.5)';
                setTimeout(() => { title.style.textShadow = '0 0 20px rgba(0,255,255,0.3)'; }, 500);
            }, 2000);
        }
    };
    
    // بدء التطبيق
    initApp();
    addEffects();
    
    // حماية إضافية: منع فتح console من بعض الهواة (تحذير بسيط)
    setInterval(() => {
        if (typeof window.console !== 'undefined' && window.console.clear && window.console.log) {
            // لا نمنع، فقط نضيف توقيع
            console.log("%cVETO VISION - Secured System v3.0", "color: #00ffff; font-size: 16px; font-weight: bold;");
            console.log("%cتم تطوير هذا النظام بحماية متقدمة", "color: #ff00ff;");
        }
    }, 5000);
</script>
</body>
</html>
