<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Predictor v6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none !important; }
        /* ستايل إجباري وبسيط جداً لضمان الظهور */
        #sec_ans {
            display: block !important;
            width: 90% !important;
            height: 60px !important;
            background-color: #ffffff !important; /* خلفية بيضاء لكسر سواد الشاشة */
            border: 4px solid #ff0000 !important; /* حدود حمراء فاقعة */
            border-radius: 12px !important;
            color: #000000 !important; /* كتابة سوداء واضحة */
            font-size: 20px !important;
            font-weight: bold !important;
            text-align: center !important;
            margin: 20px auto !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body class="bg-black text-white">

    <section id="auth-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-black">
        <h1 class="text-3xl font-black italic mb-6">QUANTUM<span class="text-blue-600">NODE</span></h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="u_log" placeholder="رقم الهاتف أو البريد" class="w-full p-4 bg-zinc-900 rounded-xl text-center border border-white/10">
            <input type="password" id="u_pas" placeholder="كلمة المرور" class="w-full p-4 bg-zinc-900 rounded-xl text-center border border-white/10">
            <button onclick="processAuth()" id="sync-btn" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase">Start Sync</button>
            <p id="status-text" class="text-center text-xs text-zinc-500 mt-4"></p>
        </div>
    </section>

    <section id="security-layer" style="position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px;">
        <div style="text-align: center; width: 100%; max-width: 350px;">
            <i class="fas fa-shield-alt" style="color: #ff0000; font-size: 50px; margin-bottom: 20px;"></i>
            <h2 style="font-size: 22px; font-weight: 900; color: white; margin-bottom: 10px;">SECURITY VERIFICATION</h2>
            <p style="color: #ff0000; font-size: 13px; font-weight: bold; margin-bottom: 20px;">أدخل اللقب أو الإجابة السرية لتأكيد هويتك</p>
            
            <input type="text" id="sec_ans" placeholder="اكتب الإجابة هنا...">
            
            <button onclick="finalVerify()" id="sec-btn" style="width: 90%; background: white; color: black; padding: 18px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer;">CONFIRM & UNLOCK</button>
        </div>
    </section>

    <section id="main-app" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center">
        <div id="target-mult" class="text-7xl font-black text-white">1.00x</div>
        <button onclick="getSignal()" class="mt-10 px-12 py-4 bg-white text-black font-black rounded-full">GET SIGNAL</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
