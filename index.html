<section id="security-layer" class="hidden" style="position: fixed; inset: 0; z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background-color: rgba(0,0,0,0.98); backdrop-filter: blur(20px);">
    
    <div style="width: 100%; max-width: 400px; text-align: center;">
        
        <div style="width: 80px; height: 80px; background: rgba(255,0,0,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; border: 2px solid #ff0000;">
            <i class="fas fa-exclamation-triangle" style="color: #ff0000; font-size: 30px;"></i>
        </div>
        
        <h2 style="color: white; font-weight: 900; font-style: italic; text-transform: uppercase; font-size: 24px; margin-bottom: 10px;">Security Lock</h2>
        <p id="sec-status" style="color: #888; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px;">أدخل الإجابة السرية أو اللقب لتأكيد هويتك</p>

        <input type="text" id="sec_ans" placeholder="أدخل اللقب أو الإجابة هنا..." 
            style="width: 100%; background: #1a1a1a; border: 3px solid #ff0000; padding: 20px; border-radius: 15px; color: white; text-align: center; font-size: 18px; font-weight: bold; outline: none; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.3);">
        
        <button onclick="finalVerify()" id="sec-btn" 
            style="width: 100%; background: white; color: black; padding: 20px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase;">
            Confirm & Unlock Account
        </button>

        <div style="margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 10px; color: #444; font-weight: 900; text-transform: uppercase;">
            <span style="width: 6px; height: 6px; background: #ff0000; border-radius: 50%;"></span>
            Verification Required
        </div>
    </div>
</section>
