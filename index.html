<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Signal Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: radial-gradient(circle at top,#020617,#000);
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* glow background */
.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#00fff233,transparent);
    filter:blur(80px);
}

/* الدائرة */
.circle{
    width:300px;
    height:300px;
    border-radius:50%;
    border:1px solid rgba(0,255,242,0.3);
    backdrop-filter: blur(10px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    box-shadow:0 0 60px rgba(0,255,242,0.2);
}

/* تأثير دوران */
.circle::before{
    content:"";
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    border:2px dashed rgba(0,255,242,0.2);
    animation:rotate 10s linear infinite;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* الرقم */
#mult{
    font-size:60px;
    font-weight:900;
    text-shadow:0 0 20px #00fff2;
    transition:0.3s;
}

/* زر */
.btn{
    margin-top:40px;
    padding:15px 50px;
    border-radius:40px;
    font-weight:bold;
    background:linear-gradient(90deg,#00fff2,#00bfff);
    color:black;
    box-shadow:0 10px 30px rgba(0,255,242,0.3);
    transition:0.2s;
}

.btn:active{
    transform:scale(0.9);
}

.loading{
    opacity:0.6;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="flex flex-col items-center">

<div class="circle">
<div id="mult">1.00x</div>
<div class="text-xs text-cyan-300 mt-2 tracking-widest">QUANTUM SIGNAL</div>
</div>

<button id="btn" class="btn">GET NEW SIGNAL</button>

</div>

<script>
const btn = document.getElementById("btn");
const mult = document.getElementById("mult");

btn.addEventListener("click", generateSignal);

function generateSignal(){

    btn.disabled = true;
    btn.classList.add("loading");
    btn.innerText = "ANALYZING...";

    let target = (Math.random() * (22 - 1.1) + 1.1).toFixed(2);

    setTimeout(()=>{

        mult.innerText = target + "x";

        mult.style.transform = "scale(1.4)";
        setTimeout(()=>{
            mult.style.transform = "scale(1)";
        },300);

        btn.disabled = false;
        btn.classList.remove("loading");
        btn.innerText = "GET NEW SIGNAL";

    },800);
}
</script>

</body>
</html>
